version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: equipment-calendar-db
    environment:
      POSTGRES_USER: equipment_user
      POSTGRES_PASSWORD: equipment_password
      POSTGRES_DB: equipment_calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
